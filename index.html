<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Inner tab styling overrides */
        .tab-content.hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased overflow-hidden">

    <div class="flex h-screen w-full">
        
        <div id="sidebar-container"></div>

        <main class="flex-1 flex flex-col h-full min-w-0">
            
            <div id="header-container"></div>

            <div id="main-view-container" class="flex-1 overflow-y-auto p-8 max-w-7xl w-full mx-auto">
                </div>
        </main>
    </div>

    <script>
        $(document).ready(function() {

            checkAuthAndBoot();

            function checkAuthAndBoot() {
                $.ajax({
                    url: 'controllers/auth-check.php',
                    type: 'GET',
                    dataType: 'json',
                    success: function (response) {
                        if (!response || response.status !== true || response.authenticated !== true) {
                            window.location.href = 'login.html';
                            return;
                        }

                        bootDashboard(response.data || {});
                    },
                    error: function () {
                        window.location.href = 'login.html';
                    }
                });
            }

            function bootDashboard(admin) {
                $('#sidebar-container').load('components/sidebar.html');
                $('#header-container').load('components/header.html', function () {
                    $('#admin-name-text').text(admin.name || 'Admin');
                    $('#admin-role-text').text(admin.role || '');
                });

                loadView('home');
            }

            // 2. PRIMARY VIEW ROUTER SWITCH
            function loadView(viewName) {
                if (viewName === 'home') {
                    $('#main-view-container').load('components/view-home.html', function () {
                        $('#page-title').text('Dashboard Home');

                        if (typeof bindHomePageEvents === 'function') {
                            bindHomePageEvents();
                        }
                    });
                } else if (viewName === 'ocr') {
                    $('#main-view-container').load('components/view-ocr.html', function () {
                        $('#page-title').text('OCR Engine Portal');

                        if (typeof bindOcrPageEvents === 'function') {
                            bindOcrPageEvents();
                        }
                    });
                } else if (viewName === 'admin') {
                    $('#main-view-container').load('components/view-admin.html', function () {
                        $('#page-title').text('Admin Management');

                        if (typeof bindAdminPageEvents === 'function') {
                            bindAdminPageEvents();
                        }
                    });
                }
            }

            // 3. NAVIGATION LINKS DELEGATION ACTION
            $(document).on('click', '#nav-home', function(e) {
                e.preventDefault();
                loadView('home');
                updateActiveSidebarStyle($(this));
            });

            $(document).on('click', '#nav-ocr', function(e) {
                e.preventDefault();
                loadView('ocr');
                updateActiveSidebarStyle($(this));
            });

            $(document).on('click', '#nav-admin', function(e) {
                e.preventDefault();
                loadView('admin');
                updateActiveSidebarStyle($(this));
            });

            function updateActiveSidebarStyle(activeElement) {
                $('aside nav a').removeClass('bg-slate-800 text-white shadow-sm').addClass('text-slate-400 hover:bg-slate-800 hover:text-white');
                activeElement.addClass('bg-slate-800 text-white shadow-sm').removeClass('text-slate-400 hover:bg-slate-800 hover:text-white');
            }

            // 4. INNER OCR VIEW TABS CONTROLS (Delegated)
            $(document).on('click', '#tab-upload-btn', function() {
                toggleInnerTabs($(this), '#tab-upload', '#tab-data');
            });

            $(document).on('click', '#tab-data-btn', function() {
                toggleInnerTabs($(this), '#tab-data', '#tab-upload');
            });

            function toggleInnerTabs(activeBtn, showTargetId, hideTargetId) {
                $('.ocr-tab-btn').removeClass('border-indigo-600 text-indigo-600').addClass('border-transparent text-slate-400 hover:text-slate-600');
                activeBtn.addClass('border-indigo-600 text-indigo-600').removeClass('border-transparent text-slate-400');
                
                $(hideTargetId).addClass('hidden');
                $(showTargetId).removeClass('hidden');
            }

            // 5. FILE SELECTION FEEDBACK (Delegated)
            $(document).on('change', '#file-input', function() {
                const files = this.files;
                const container = $('#preview-container');
                container.empty();
                
                if (files.length > 0) {
                    $('#file-list-preview').removeClass('hidden');
                    Array.from(files).forEach(file => {
                        container.append(`
                            <div class="flex items-center text-xs text-slate-600 bg-slate-100 rounded-lg p-2 max-w-md">
                                <i class="fa-solid fa-paperclip text-indigo-500 mr-2"></i>
                                <span class="font-medium truncate">${file.name}</span>
                            </div>`);
                    });
                } else {
                    $('#file-list-preview').addClass('hidden');
                }
            });


            $(document).on('click', '#btn-logout', function() {
                Swal.fire({
                    title: 'Sign Out Confirmation',
                    text: 'Exit secure dashboard session?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#4f46e5',
                    cancelButtonColor: '#64748b',
                    confirmButtonText: 'Logout'
                }).then(function(result) {
                    if (!result.isConfirmed) return;

                    $.ajax({
                        url: 'controllers/auth-logout.php',
                        type: 'POST',
                        dataType: 'json',
                        complete: function () {
                            window.location.href = 'login.html';
                        }
                    });
                });
            });
        });
    </script>
    <script src="controllers/view-home.js"></script>
    <script src="controllers/view-ocr.js"></script>
    <script src="controllers/view-admin.js"></script>
</body>
</html>
