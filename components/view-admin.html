<div class="space-y-6">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h2 class="text-xl font-bold text-slate-900">Admin Management</h2>
                <p class="text-sm text-slate-400 mt-1">Create, update, delete, and manage dashboard admin accounts.</p>
            </div>

            <button id="btn-open-admin-form" type="button" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-all">
                <i class="fa-solid fa-plus mr-2"></i>
                Add Admin
            </button>
        </div>
    </div>

    <div id="admin-form-card" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 hidden">
        <div class="flex items-center justify-between mb-5">
            <div>
                <h3 id="admin-form-title" class="text-sm font-bold text-slate-800">Add Admin</h3>
                <p class="text-xs text-slate-400 mt-1">Fill admin data below.</p>
            </div>

            <button id="btn-close-admin-form" type="button" class="text-slate-400 hover:text-rose-500">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

        <form id="admin-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="admin-id" name="id">

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-2">Name</label>
                <input id="admin-name" name="name" type="text" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="Admin name">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-2">Email</label>
                <input id="admin-email" name="email" type="email" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="admin@email.com">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-2">Password</label>
                <input id="admin-password" name="password" type="password" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="Leave blank when editing">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-2">Role</label>
                <select id="admin-role" name="role" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    <option value="SUPER_ADMIN">SUPER_ADMIN</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="OPERATOR">OPERATOR</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-2">Status</label>
                <select id="admin-status" name="status" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>
            </div>

            <div class="md:col-span-2 flex justify-end gap-2 pt-2">
                <button id="btn-reset-admin-form" type="button" class="bg-white border border-slate-200 text-slate-600 text-sm font-semibold px-4 py-2 rounded-xl hover:border-slate-300">
                    Reset
                </button>

                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-all">
                    Save Admin
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
                <h3 class="text-sm font-bold text-slate-800">Admin List</h3>
                <p id="admin-list-summary" class="text-xs text-slate-400 mt-1">Loading admins...</p>
            </div>

            <div class="flex items-center gap-2">
                <input id="admin-search" type="text" class="border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="Search name/email">

                <select id="admin-filter-status" class="border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    <option value="">All Status</option>
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>

                <button id="btn-refresh-admin" type="button" class="bg-white border border-slate-200 hover:border-indigo-500 text-slate-600 hover:text-indigo-600 text-sm font-semibold px-4 py-2 rounded-xl transition-all">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-xs uppercase text-slate-400">
                    <tr>
                        <th class="px-6 py-3">Admin</th>
                        <th class="px-6 py-3">Role</th>
                        <th class="px-6 py-3">Status</th>
                        <th class="px-6 py-3">Created</th>
                        <th class="px-6 py-3 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body" class="divide-y divide-slate-100">
                    <tr>
                        <td colspan="5" class="px-6 py-8 text-center text-sm text-slate-400">
                            Loading admins...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="p-4 border-t border-slate-100 flex items-center justify-end gap-2">
            <button id="btn-prev-admin-page" type="button" class="bg-white border border-slate-200 text-slate-600 text-xs font-semibold px-3 py-2 rounded-lg">
                Prev
            </button>

            <span id="admin-page-info" class="text-xs text-slate-500 min-w-[90px] text-center">
                Page 1 / 1
            </span>

            <button id="btn-next-admin-page" type="button" class="bg-white border border-slate-200 text-slate-600 text-xs font-semibold px-3 py-2 rounded-lg">
                Next
            </button>
        </div>
    </div>
</div>
