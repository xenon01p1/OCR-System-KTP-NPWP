<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OCR Admin Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-100 font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-8 text-white">
                <div class="w-14 h-14 bg-white/15 rounded-2xl flex items-center justify-center mb-5">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>

                <h1 class="text-2xl font-bold">OCR Admin Login</h1>
                <p class="text-indigo-100 text-sm mt-2">
                    Sign in to access the OCR dashboard.
                </p>
            </div>

            <form id="login-form" class="p-8 space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-2">Email</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input
                            id="login-email"
                            name="email"
                            type="email"
                            autocomplete="email"
                            class="w-full border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-sm focus:outline-none focus:border-indigo-500"
                            placeholder="admin@email.com">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-2">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input
                            id="login-password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            class="w-full border border-slate-200 rounded-xl pl-11 pr-12 py-3 text-sm focus:outline-none focus:border-indigo-500"
                            placeholder="Your password">

                        <button id="btn-toggle-password" type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button
                    id="btn-login"
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-3 rounded-xl transition-all">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>
                    Login
                </button>
            </form>
        </div>
    </div>

    <script src="controllers/view-login.js"></script>
</body>
</html>
